<!DOCTYPE html>
<html>
<head>
    <title>Rate your Rental | AgriRent</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #2e7d32; }
        h2 { color: #2e7d32; margin-top: 0; }
        label { font-weight: bold; color: #555; display: block; margin-top: 15px; }
        select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { background-color: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Rate Your Experience</h2>
        <p style="color: #666; font-size: 14px;">Your feedback helps vendors improve their service.</p>
        
        <form method="POST">
            <label>Rating:</label>
            <select name="rating" required>
                <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                <option value="4">⭐⭐⭐⭐ (Good)</option>
                <option value="3">⭐⭐⭐ (Average)</option>
                <option value="2">⭐⭐ (Fair)</option>
                <option value="1">⭐ (Poor)</option>
            </select>

            <label>Comment:</label>
            <textarea name="comment" rows="5" placeholder="Share your experience with the equipment and vendor..." required></textarea>

            <button type="submit">Submit Feedback</button>
        </form>
        <a href="{{ url_for('my_bookings') }}" class="back-link">Cancel and go back</a>
    </div>
</body>
</html>
