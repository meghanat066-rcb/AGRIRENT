<!DOCTYPE html>
<html>
<head>
    <title>Admin Login | AgriRent</title>
</head>
<body style="background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('https://plus.unsplash.com/premium_photo-1661820236982-9199611de9dd?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTd8fGFncmljdWx0dXJlJTIwZmllbGR8ZW58MHx8MHx8fDA%3D'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="max-width: 400px; width: 100%; margin: 0 auto; background: rgba(51, 51, 51, 0.9); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; color: white;">
        <h2 style="margin-bottom: 25px; letter-spacing: 1px;">ADMIN PANEL</h2>
        <form action="{{ url_for('admin_login') }}" method="POST">
            <div style="text-align: left; margin-bottom: 15px;">
                <label>Username</label>
                <input type="text" name="username" value="admin" required style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 4px; border: none; box-sizing: border-box;">
            </div>
            <div style="text-align: left; margin-bottom: 25px;">
                <label>Password</label>
                <input type="password" name="password" value="admin" required style="width: 100%; padding: 12px; margin-top: 5px; border-radius: 4px; border: none; box-sizing: border-box;">
            </div>
            <button type="submit" style="width: 100%; padding: 14px; background: #f16e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;">SECURE LOGIN</button>
        </form>
        <p style="margin-top: 20px; font-size: 13px; color: #aaa;">Authorized Access Only</p>
    </div>
</body>
</html>
