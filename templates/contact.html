<!DOCTYPE html>
<html>
<head>
    <title>Contact Us | AgriRental</title>
    <style>
        :root { --dark-green: #2e4d23; --primary-orange: #f16e22; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4fdf4; margin: 0; padding: 50px; }
        .contact-container { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--dark-green); text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: var(--primary-orange); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #d95d1a; }
        .alert { padding: 10px; margin-bottom: 20px; border-radius: 5px; text-align: center; background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>
    <div class="contact-container">
        <h2>Contact Support</h2>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('send_inquiry') }}" method="POST">
            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="text" name="subject" placeholder="Subject" required>
            <textarea name="message" rows="5" placeholder="How can we help you?" required></textarea>
            <button type="submit">Send Message</button>
        </form>
        <p style="text-align:center;">
            <a href="{{ url_for('customer_home') }}" style="color: var(--dark-green); text-decoration: none; font-weight: bold;">← Back to Home</a>
        </p>
    </div>
</body>
</html>
